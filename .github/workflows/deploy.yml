name: Deploy to GitHub Pages

on:
    push:
        branches:
            - deployed # Change this to your main branch name

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v2

            - name: Setup Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: "14"

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build

            - name: Deploy
              uses: JamesIves/github-pages-deploy-action@3.7.1
              with:
                  ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  BRANCH: deployed # Change this to your deployment branch
                  FOLDER: .next
